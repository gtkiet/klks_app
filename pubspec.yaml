name: klks_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  image: ^4.8.0
  intl: ^0.20.2
  dio: ^5.9.2
  go_router: ^17.1.0
  cached_network_image: ^3.4.1
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_secure_storage: ^10.0.0
  flutter_launcher_icons: ^0.14.4

# ────────────── LAUNCHER ICON CONFIG ──────────────
flutter_launcher_icons:
  android: true
  ios: true

  # Icon chính (PNG vuông)
  image_path: "assets/icons/app_icon.png"

  # ⚠️ FIX ICON NHỎ (QUAN TRỌNG)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#0000ff"

  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

# ────────────── ASSETS ──────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/